# See world with colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:RGB"

# BEGIN Shortcuts
#
unbind r
bind r source-file $HOME/.tmux.conf
# END Shortcuts

# Keep set names
set-option -g allow-rename off

# Enable mouse
set -g mouse

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'robhurring/tmux-uptime'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# BEGIN Theme
#
# \ue0b6 half-circle left | \ue0b4 half-circle right
thm_none=default
thm_back="#12131a"
thm_dark="#222436"
thm_light="#c8d3f5"

# status bars left/right
set -g status "on"
set -g status-position bottom
set -g status-style "bg=${thm_back}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# status-left
set -g status-left "#[bg=${thm_none},fg=${thm_light}]\ue0b6"
set -ag status-left "#[bg=${thm_light},fg=${thm_dark}]#S#[bg=${thm_none},fg=${thm_light}]\ue0b4 "

# status-right
set -g status-right "#[bg=${thm_none},fg=${thm_dark}]\ue0b6#[bg=${thm_dark},fg=${thm_light}]#{user} "
set -ag status-right "#[bg=${thm_dark},fg=${thm_light}]\ue0b6#[bg=${thm_light},fg=${thm_dark}]%H:%M %Y-%m-%d#[bg=${thm_none},fg=${thm_light}]\ue0b4"
# Pills & Icons
# set -g status-right "#[bg=${thm_none},fg=${thm_light}]\ue0b6#[bg=${thm_light},fg=${thm_dark}]\uf2be \ue0b6#[bg=${thm_dark},fg=${thm_light}]#{user} "
# set -ag status-right "#[bg=${thm_none},fg=${thm_light}]\ue0b6#[bg=${thm_light},fg=${thm_dark}]\uf43a \ue0b6#[bg=${thm_dark},fg=${thm_light}]%H:%M %Y-%m-%d"
# set -ag status-right "#[bg=${thm_none},fg=${thm_dark}]\ue0b4"

# window-status
set -g window-status-style "bg=${thm_none}"
set -g window-status-separator " "

setw -g window-status-format "#[bg=${thm_none},fg=${thm_dark}]\ue0b6"
setw -ag window-status-format "#[bg=${thm_dark},fg=${thm_light}]#I"
setw -ag window-status-format "#[bg=${thm_none},fg=${thm_dark}]\ue0b4"
setw -ag window-status-format "#[bg=${thm_none},fg=${thm_light},dim] #W#F"

setw -g window-status-current-format "#[bg=${thm_none},fg=${thm_light}]\ue0b6"
setw -ag window-status-current-format "#[bg=${thm_light},fg=${thm_dark}]#I"
setw -ag window-status-current-format "#[bg=${thm_dark},fg=${thm_light}]\ue0b4"
setw -ag window-status-current-format "#[bg=${thm_dark},fg=${thm_light}] #W#F"
setw -ag window-status-current-format "#[bg=${thm_none},fg=${thm_dark}]\ue0b4"
setw -g window-status-current-style bold

# panes border
set -g pane-border-style "fg=${thm_dark}"
set -g pane-active-border-style "fg=${thm_light}"

# message/command bar
set -g message-style "bg=${thm_dark},fg=${thm_light}"
set -g message-command-style "bg=${thm_dark},fg=${thm_light}"

# Style pour le menu de sélection des sessions (Leader + s) et des fenêtres (Leader + w)
setw -g mode-style "fg=${thm_dark},bg=${thm_light},bold"
# Style des bordures de la liste de sélection
set -g display-panes-active-colour "${thm_light}"
set -g display-panes-colour "${thm_dark}"

# Window activity and bell styling (notifications in background windows)
setw -g window-status-activity-style "fg=${thm_light},bg=${thm_none},none"
setw -g window-status-bell-style "fg=${thm_light},bg=${thm_none},bold"

# Clock mode color (Prefix + t)
setw -g clock-mode-colour "${thm_light}"
setw -g clock-mode-style 24

# Context menu styling (Tmux 3.0+)
set -g menu-style "fg=${thm_light},bg=${thm_dark}"
set -g menu-selected-style "fg=${thm_dark},bg=${thm_light}"

# END Theme
